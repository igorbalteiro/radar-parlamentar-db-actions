name: Coletar Dados Câmara

on:
  schedule:
    - cron: '0 6 * * *'      # Diariamente às 06h UTC (metricas + emendas)
    - cron: '0 8 * * 6'      # Sábados às 08h UTC (deputados + presenças)
  workflow_dispatch:
    inputs:
      script_selecionado:
        description: 'Qual script deseja rodar?'
        required: true
        default: 'todos'
        type: choice
        options:
          - todos
          - deputados
          - metricas
          - emendas
          - presencas

jobs:
  coletar_diario:
    name: Coleta diária (metricas + emendas)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.script_selecionado == 'todos' ||
        github.event.inputs.script_selecionado == 'metricas' ||
        github.event.inputs.script_selecionado == 'emendas'
      ))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar coleta (Metricas)
        if: |
          github.event_name == 'schedule' ||
          github.event.inputs.script_selecionado == 'todos' ||
          github.event.inputs.script_selecionado == 'metricas'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/coletar_metricas.py

      - name: Executar coleta (Emendas)
        if: |
          github.event_name == 'schedule' ||
          github.event.inputs.script_selecionado == 'todos' ||
          github.event.inputs.script_selecionado == 'emendas'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/coletar_emendas.py

  coletar_deputados:
    name: Coleta semanal (deputados)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 6') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.script_selecionado == 'todos' ||
        github.event.inputs.script_selecionado == 'deputados'
      ))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar coleta (Deputados)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/coletar_deputados.py

  coletar_presencas:
    name: Coleta semanal (presenças)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 6') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.script_selecionado == 'todos' ||
        github.event.inputs.script_selecionado == 'presencas'
      ))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar coleta (Presenças)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/coletar_presencas.py